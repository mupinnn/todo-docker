name: Promote Images and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'

  promote:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR number from merge commit
        id: get-pr
        run: |
          PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            # Fallback: extract from commit message (e.g., "Merge pull request #123")
            PR_NUMBER=$(git log -1 --pretty=%B | grep -oP '(?<=#)\d+' | head -1)
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found PR number: $PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote API image
        if: ${{ needs.detect-changes.outputs.api == 'true' }}
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:pr-${{ steps.get-pr.outputs.pr_number }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:pr-${{ steps.get-pr.outputs.pr_number }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:pr-${{ steps.get-pr.outputs.pr_number }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}

      - name: Promote Web image
        if: ${{ needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true' }}
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:pr-${{ steps.get-pr.outputs.pr_number }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:pr-${{ steps.get-pr.outputs.pr_number }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:pr-${{ steps.get-pr.outputs.pr_number }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ github.sha }}

      - name: Promote Migrate image
        if: ${{ needs.detect-changes.outputs.api == 'true' }}
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:pr-${{ steps.get-pr.outputs.pr_number }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:pr-${{ steps.get-pr.outputs.pr_number }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest

  deploy:
    needs: [detect-changes, promote]
    if: ${{ needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images from GHCR
        env:
          API_CHANGED: ${{ needs.detect-changes.outputs.api }}
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web }}
        run: |
          IMAGES=""
          # Always pull API and migrate (needed for stack)
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest todo-docker-api:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:latest todo-docker-migrate:latest
          IMAGES="todo-docker-api:latest todo-docker-migrate:latest"
          
          # Always pull Web (needed for stack)
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest todo-docker-web:latest
          IMAGES="$IMAGES todo-docker-web:latest"
          
          echo "IMAGES_TO_SAVE=$IMAGES" >> $GITHUB_ENV

      - name: Create .env
        run: |
          echo "${{ secrets.ENV_ROOT }}" > .env
          mkdir -p apps/web
          echo "${{ secrets.ENV_WEB }}" > ./apps/web/.env
          mkdir -p apps/api
          echo "${{ secrets.ENV_API }}" > ./apps/api/.env

      - name: Save docker images to tarball
        run: |
          docker save -o app-images.tar ${{ env.IMAGES_TO_SAVE }}

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          source: "app-images.tar,docker-compose.yml,docker-compose.prod.yml,.env,apps/web/.env,apps/api/.env"
          target: "~/deploy/todo-docker"

      - name: Deploy to server
        env:
          API_CHANGED: ${{ needs.detect-changes.outputs.api }}
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          envs: API_CHANGED,WEB_CHANGED
          script: |
            cd ~/deploy/todo-docker
            echo "Loading docker images . . ."
            docker load -i app-images.tar
            
            echo "Restarting services . . ."
            SERVICES=""
            if [[ "$API_CHANGED" == "true" ]]; then
              SERVICES="$SERVICES migrate api"
            fi
            if [[ "$API_CHANGED" == "true" || "$WEB_CHANGED" == "true" ]]; then
              SERVICES="$SERVICES web"
            fi
            
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --force-recreate $SERVICES
            rm app-images.tar
            docker image prune -f
