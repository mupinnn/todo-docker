name: Build Docker Image on PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/pr.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web: 'apps/web/**'
            api: 'apps/api/**'

  build-images:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.apps != '' && toJSON(fromJSON(needs.detect-changes.outputs.apps)) != '[]' }}
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ github.repository }}-${{ matrix.app }} image
        uses: docker/build-push-action@v5
        env:
          IMAGE_NAME: ${{ github.repository }}/${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},scope=${{ matrix.app }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},scope=${{ matrix.app }},mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository }}/migrate:pr-${{ github.event.pull_request.number }}
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrate
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }},scope=migrate
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }},scope=migrate,mode=max

  e2e:
    needs: [detect-changes, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E tests
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/web:pr-${{ github.event.pull_request.number }}
          WEB_IMAGE: ${{ env.REGISTRY}}/${{ github.repository }}/api:pr-${{ github.event.pull_request.number }}
          MIGRATE_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/migrate:pr-${{ github.event.pull_request.number }}
        run: |
          cat <<EOF > docker-compose.e2e.run.yml
          services:
            db:
              image: postgres:16
              environment:
                - POSTGRES_PASSWORD=postgres
                - POSTGRES_USER=postgres
                - POSTGRES_DB=postgres
            migrate:
              image: ${MIGRATE_IMAGE}
              environment:
                - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
              depends_on:
                db:
                  condition: service_started
            api:
              image: ${API_IMAGE}
              environment:
                - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
              depends_on:
                migrate:
                  condition: service_completed_successfully
                db:
                  condition: service_started
            web:
              image: ${WEB_IMAGE}
              depends_on:
                - api
            playwright:
              image: mcr.microsoft.com/playwright:v1.49.1-jammy
              environment:
                - BASE_URL=http://web:80
              working_dir: /app/e2e
              volumes:
                - .:/app
              command: npx playwright test
              depends_on:
                web:
                  condition: service_started
          EOF

          docker compose -f docker-compose.e2e.run.yml up --exit-code-from playwright
