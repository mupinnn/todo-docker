name: Build Docker Image on PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/pr.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web: 'apps/web/**'
            api: 'apps/api/**'

  build-images:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.apps != '' && toJSON(fromJSON(needs.detect-changes.outputs.apps)) != '[]' }}
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ github.repository }}-${{ matrix.app }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}:buildcache,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrate
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/migrate:pr-${{ github.event.pull_request.number }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/migrate:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/migrate:buildcache,mode=max

  e2e:
    needs: [detect-changes, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env
        run: |
          echo "${{ secrets.ENV_ROOT }}" > .env

          mkdir -p apps/web
          echo "${{ secrets.ENV_WEB }}" > ./apps/web/.env

          mkdir -p apps/api
          echo "${{ secrets.ENV_API }}" > ./apps/api/.env

      - name: Run E2E tests
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/api:pr-${{ github.event.pull_request.number }}
          WEB_IMAGE: ${{ env.REGISTRY}}/${{ github.repository }}/web:pr-${{ github.event.pull_request.number }}
          MIGRATE_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/migrate:pr-${{ github.event.pull_request.number }}
        run: |
          docker compose -f docker-compose.e2e.yml up --exit-code-from playwright
