name: Build, Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrate
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run E2E tests
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:sha-${{ github.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:sha-${{ github.sha }}
          MIGRATE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:sha-${{ github.sha }}
        run: |
          cat <<EOF > docker-compose.e2e.run.yml
          services:
            db:
              image: postgres:16
              environment:
                - POSTGRES_PASSWORD=postgres
                - POSTGRES_USER=postgres
                - POSTGRES_DB=postgres
            migrate:
              image: ${MIGRATE_IMAGE}
              environment:
                - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
              depends_on:
                db:
                  condition: service_started
            api:
              image: ${API_IMAGE}
              environment:
                - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
              depends_on:
                migrate:
                  condition: service_completed_successfully
                db:
                  condition: service_started
            web:
              image: ${WEB_IMAGE}
              depends_on:
                - api
            playwright:
              image: mcr.microsoft.com/playwright:v1.49.1-jammy
              environment:
                - BASE_URL=http://web:80
              working_dir: /app
              volumes:
                - .:/app
              command: npx playwright test
              depends_on:
                web:
                  condition: service_started
          EOF

          docker compose -f docker-compose.e2e.run.yml up --exit-code-from playwright

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images from GHCR
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:sha-${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:sha-${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:sha-${{ github.sha }}

          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:sha-${{ github.sha }} todo-docker-api:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:sha-${{ github.sha }} todo-docker-web:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrate:sha-${{ github.sha }} todo-docker-migrate:latest

      - name: Create .env
        run: |
          echo "${{ secrets.ENV_ROOT }}" > .env
          mkdir -p apps/web
          echo "${{ secrets.ENV_WEB }}" > ./apps/web/.env
          mkdir -p apps/api
          echo "${{ secrets.ENV_API }}" > ./apps/api/.env

      - name: Save docker images to tarball
        run: |
          docker save -o app-images.tar todo-docker-api:latest todo-docker-web:latest todo-docker-migrate:latest

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          source: "app-images.tar,docker-compose.yml,docker-compose.prod.yml,.env,apps/web/.env,apps/api/.env"
          target: "~/deploy/todo-docker"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/deploy/todo-docker
            echo "Loading docker images . . ."
            docker load -i app-images.tar
            echo "Restarting services . . ."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --force-recreate
            rm app-images.tar
            docker image prune -f
