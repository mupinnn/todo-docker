name: Promote Docker Image and Deploy

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web: 'apps/web/**'
            api: 'apps/api/**'

  promote-images:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.apps != '' && toJSON(fromJSON(needs.detect-changes.outputs.apps)) != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote ${{ github.event.repository.name }}/${{ matrix.app }} image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:pr-${{ github.event.pull_request.number }}

          docker tag ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:pr-${{ github.event.pull_request.number }} ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:latest
          docker tag ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:pr-${{ github.event.pull_request.number }} ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:${{ github.sha }}

          docker push ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:latest
          docker push ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:${{ github.sha }}

      - name: Promote todo-docker/migrate image
        run: |
          docker pull ${{ env.REGISTRY }}/todo-docker/migrate:pr-${{ github.event.pull_request.number }}
          docker tag ${{ env.REGISTRY }}/todo-docker/migrate:pr-${{ github.event.pull_request.number }} ${{ env.REGISTRY }}/todo-docker/migrate:latest
          docker push ${{ env.REGISTRY }}/todo-docker/migrate:latest

  deploy:
    needs: [detect-changes, promote-images]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Deploy to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e

            cd ~/deploy/todo-docker || {
              echo "Project directory not found. Cloning repository . . ."
              git clone https://github.com/mupinnn/todo-docker.git ~/deploy/todo-docker
              cd ~/deploy/todo-docker
            }

            git pull origin main || true

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull related image
            docker pull ${{ env.REGISTRY }}/${{ github.event.repository.name }}/${{ matrix.app }}:${{ github.sha }}

            if [[ "${{ matrix.app }}" == "api" ]]; then
              docker pull ${{ env.REGISTRY }}/${{ github.event.repository.name}}/migrate:${{ github.sha }}
            fi

            echo "Preparing environment variables . . ."
            echo "${{ secrets.ENV_ROOT }}" > .env

            mkdir -p apps/web
            echo "${{ secrets.ENV_WEB }}" > ./apps/web/.env

            mkdir -p apps/api
            echo "${{ secrets.ENV_API }}" > ./apps/api/.env

            echo "Restarting services . . ."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --force-recreate

            docker image prune -f
