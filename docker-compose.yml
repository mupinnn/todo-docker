services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  e2e:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    network_mode: host
    environment:
      - BASE_URL=http://localhost:5173
      - CI=true
    volumes:
      - .:/app
    working_dir: /app/e2e
    command: npx playwright test

volumes:
  postgres-data:
